<!DOCTYPE html>
 <html lang="pt-br">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <form>
      <label for="nome">Nome: </label>
      <input type="text" name="usuario-nome" required>
     <br>
       <label for="Telefone">Telefone: </label>
      <input type="number" name="telefone">
      <br>
      <label for="sexo">Sexo: </label>
      <input type="radio" id="fem" name="sexo" value="feminino">
      <label for="fem">Feminino</label>

      <input type="radio" id="masc" name="sexo" value="masculino">
      <label for="masc">Masculino</label>
     <br>
      <label for="estadocivil">Estado Civil: </label>
      <select id="estado-civil" name="estado-civil" required>
            <option value=" " disabled select hidden>Escolha uma opção</option>
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="Divorciado">Divorciado</option>
            <option value="Viúvo">Viúvo</option>
            <option value="Outros">Divorciado</option>
       </select>
     <br>
       <div>
        <label for="email-usuario">E-mail:</label>
        <input type="email" name="email" required placeholder="exemplo@email.com">
       </div>
        <label for="endereço">Endereço: </label>
        <input type="text" name="endereço" required>
        <label for="numero-casa">Número: </label>
        <input type="number" name="Numero" min="1" required>
        <br>
        <label for="datanascimento">Data de Nascimento:</label>
        <input type="date" id="datanascimento" name="data_nascimento" required>
        </div>
     <br>
       <button type="submit">Cadastrar</button>
       <button type="reset">Limpar</button>
    </form>


 </body>
 </html>
