 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista07</title>
</head>
<body style="font-family: 'Franklin Gothic Medium';">

    <form style="max-width: 500px;">
      <fieldset style="border:2px solid rgb(10, 161, 113); border-radius: 8px;">
        <legend style="padding: 0 10px; color: rgb(134, 138, 185);">CADASTRO</legend>
 
        <label for="nome"><b>Nome:</b></label>
        <input type="text" id="nome" name="usuario-nome" required>
        <br><br>

        <label><b>Sexo:</b></label>
        <input type="radio" id="fem" name="sexo" value="feminino" required>
        <label for="fem">Feminino</label>
        <input type="radio" id="masc" name="sexo" value="masculino" required>
        <label for="masc">Masculino</label>
        <br><br>

        <label for="telefone"><b>Telefone:</b></label>
        <input type="tel" id="telefone" name="telefone" required placeholder="(99) 9999-9999">
        <br><br>

        <label for="estado-civil"><b>Estado Civil:</b></label>
        <select id="estado-civil" name="estado-civil" required>
            <option value="" disabled selected hidden>Escolha uma opção</option>
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="divorciado">Divorciado(a)</option>
            <option value="viuvo">Viúvo(a)</option>
        </select>
        <br><br>
        
        <label for="email"><b>E-mail:</b></label>
        <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
        <br><br>

        <label for="endereco"><b>Endereço:</b></label>
        <input type="text" id="endereco" name="endereço" required>
        <br><br>

        <label for="numero-casa"><b>Número:</b></label>
        <input type="number" id="numero-casa" name="Numero" min="1" max="9999" required>
        <br><br>

        <label for="complemento"><b>Complemento:</b></label>
        <input type="text" id="complemento" name="completo">
        <br><br>
        
        <label for="cep"><b>CEP:</b></label>
        <input type="text" id="cep" name="cep" required placeholder="00000-000">
        <br><br>
        
        <label for="datanascimento"><b>Data de Nascimento:</b></label>
        <input type="date" id="datanascimento" name="data_nascimento" required>
        <br><br>
        
        <button type="submit"><b>Cadastrar</b></button>
        <button type="reset"><b>Limpar</b></button>
      </fieldset>
    </form>

</body>
</html>
